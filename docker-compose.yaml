services:
  postgres:
    image: postgres:16.5-alpine
    container_name: passwordserver-postgres
    restart: always
    environment:
      TZ: "Asia/Shanghai"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "123abc..."
      POSTGRES_DB: "postgres"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:alpine
    container_name: passwordserver-redis
    restart: always
    environment:
      TZ: "Asia/Shanghai"
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--requirepass"
      - "123abc..."
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '123abc...' ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 20

  casdoor:
    image: casbin/casdoor:latest
    container_name: passwordserver-casdoor
    restart: always
    environment:
      TZ: "Asia/Shanghai"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3334:8000"
    volumes:
      - ./middleware/casdoor/conf/app.conf:/conf/app.conf:ro
      - casdoor_files:/files

  passwordserver:
    build:
      context: .
      dockerfile: dockerfile.server
    image: passwordserver
    container_name: passwordserver
    restart: always
    environment:
      TZ: "Asia/Shanghai"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  passwordweb:
    build:
      context: .
      dockerfile: dockerfile.web
    image: passwordweb
    container_name: passwordweb
    restart: always
    environment:
      TZ: "Asia/Shanghai"
    depends_on:
      - passwordserver
      - casdoor
    ports:
      - "3333:80"

volumes:
  postgres_data:
  redis_data:
  casdoor_files:
